name: Build Logger Library

on:
  push:
    tags:
      - "v*"
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with GCC
        run: make

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logger-linux
          path: build/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build with MSVC
        shell: cmd
        run: nmake /f Makefile.win

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logger-windows
          path: build/
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: logger-linux
          path: artifacts/linux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: logger-windows
          path: artifacts/windows

      - name: Get short commit message
        id: commit_msg
        run: |
          SHORT_MSG=$(git log -1 --pretty=%s)
          echo "short_msg=$SHORT_MSG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          body: |
            ${{ steps.commit_msg.outputs.short_msg }}
            See this commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/linux/**
            artifacts/windows/**
